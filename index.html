<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLX</title>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
        }

        #wrapper {
            width: 100vw;
            height: 100vh;
            background-color: #eee;
        }

        
        #container {
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            margin: 0 auto;
            position: relative;
        }

        @media only screen and (min-width: 1376px) {
            #container {
                width: 30vw;
            }
        }

        #menu {
            position: absolute;
            bottom: 0px;
            width: 100%;
            height: 80px;
            display: flex;
            padding: 0 5px;
            background-color: #fff;
            box-shadow: rgba(0, 0, 0, 0.1) 0px -2px 12px;
        }

        #menu>button {
            flex: 1;
            margin: 5px;
            border: none;
            background-color: #fff;
            color: #333;
            border-radius: 10px;

        }

        #menu>button:hover {
            flex: 1;
            margin: 5px;
            border: none;
            background-color: #00AFC1;
        }

        #menu>button:active {
            flex: 1;
            margin: 5px;
            border: none;
            color: #FFD124;
        }

        #content {
            width: 100%;
            height: 100%;
            padding: 40px 20px 10px 20px;
        }

    </style>
</head>

<body>
    <div id="wrapper">
        <div id="container">
            <div id="content">
                <div id="check">
                    <h2>Đăng ký</h2>
                    <form action="" method="post">
                        <fieldset>
                            <legend>Who are you, bro?</legend>
                            <label for="name">Tên</label>
                            <select name="name" id="">
                                <option value="0">Chọn tên</option>
                                <option value="1">Nguyễn Văn A</option>
                                <option value="2">Nguyên Văn B</option>
                                <option value="3">Nguyễn Văn C</option>
                            </select>
                        </fieldset>

                        <fieldset>
                            <legend>Thứ hai</legend>
                            <p>Ban ngày</p>
                            <input type="radio" name="0" id="0">
                            <label for="0">0</label>
                            <input type="radio" name="1" id="1">
                            <label for="1">1</label>
                            <input type="radio" name="2" id="2">
                            <label for="2">2</label>

                        </fieldset>
                        
                    </form>
                </div>
            </div>

            <div id="menu">
                <button>
                    <ion-icon name="home" size="large"></ion-icon>
                    <p>Trang chính</p>
                </button>
    
                <button>
                    <ion-icon name="checkbox" size="large"></ion-icon>
                    <p>Đăng ký</p>
                </button>
    
                <button>
                    <ion-icon name="list" size="large"></ion-icon>
                    <p>Xem</p>
                </button>
    
                <button>
                    <ion-icon name="stats-chart" size="large"></ion-icon>
                    <p>Báo cáo</p>
                </button>
            </div>
        </div>
    </div>
</body>

</html>
